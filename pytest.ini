[pytest]
# Pytest configuration for RAG evaluation suite

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# Markers
markers =
    retrieval: tests for retrieval quality (deterministic)
    faithfulness: tests for answer grounding (LLM judge)
    correctness: tests for factual correctness (LLM judge)
    scope: tests for scope enforcement (LLM judge)
    quality: tests for response quality (LLM judge)
    conversational: tests for multi-turn conversations (LLM judge)
    slow: marks tests as slow (deselect with '-m "not slow"')

# Logging
log_cli = false
log_cli_level = INFO

# Coverage (optional)
# Uncomment to enable coverage reporting
# addopts = --cov=app --cov-report=html --cov-report=term

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning